name: VoidPulse Analytics Refresh

on:
  schedule:
    # 12:00 UTC = 15:00 Iraq — runs midday, data is fresh by upload time at 23:00 UTC
    - cron: '0 12 * * *'

  workflow_dispatch:
    inputs:
      force:
        description: 'Force refresh even if no new videos'
        required: false
        type: boolean
        default: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install google-auth google-auth-oauthlib google-api-python-client python-dotenv

      - name: Restore secrets
        env:
          ANTHROPIC_API_KEY:          ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY:         ${{ secrets.ELEVENLABS_API_KEY }}
          PEXELS_API_KEY:             ${{ secrets.PEXELS_API_KEY }}
          TELEGRAM_BOT_TOKEN:         ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:           ${{ secrets.TELEGRAM_CHAT_ID }}
          YOUTUBE_TOKEN_JSON:         ${{ secrets.YOUTUBE_TOKEN_JSON }}
          YOUTUBE_CLIENT_SECRET_JSON: ${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}
        run: |
          python - << 'PYEOF'
          import os
          with open('.env', 'w') as f:
              for k in ['ANTHROPIC_API_KEY','ELEVENLABS_API_KEY','PEXELS_API_KEY',
                        'TELEGRAM_BOT_TOKEN','TELEGRAM_CHAT_ID']:
                  f.write(f"{k}={os.environ.get(k,'')}\n")
          with open('token.json',        'w', encoding='utf-8') as f:
              f.write(os.environ['YOUTUBE_TOKEN_JSON'])
          with open('client_secret.json','w', encoding='utf-8') as f:
              f.write(os.environ['YOUTUBE_CLIENT_SECRET_JSON'])
          print("Secrets restored.")
          PYEOF

      - name: Refresh analytics
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python analytics.py --refresh

      - name: Commit updated performance data
        run: |
          git config user.name  "VoidPulse Bot"
          git config user.email "voidpulse-bot@users.noreply.github.com"
          git add metadata/performance.json metadata/smart_topics.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: refresh analytics [skip ci]"
          git push origin HEAD 2>/dev/null || true

      - name: Update YOUTUBE_TOKEN_JSON secret (after token refresh)
        if: env.GH_PAT != ''
        env:
          GH_PAT:  ${{ secrets.GH_PAT }}
          GH_REPO: ${{ github.repository }}
        run: |
          [ -f token.json ] && gh secret set YOUTUBE_TOKEN_JSON < token.json --repo "$GH_REPO" \
            && echo "Token secret updated." || true
