name: VoidPulse Daily Upload

on:
  schedule:
    # 23:00 UTC = 02:00 Iraq (UTC+3) = 18:00 US Eastern = 23:00 UK — peak Shorts audience
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      topic:
        description: 'Custom topic (leave empty = smart auto-select)'
        required: false
        default: ''
      skip_upload:
        description: 'Skip YouTube upload — video file only'
        required: false
        type: boolean
        default: false

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write        # لازم لـ git push بعد التشغيل

    steps:
      # ── 1. تحميل الكود ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python ─────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. System dependencies (ffmpeg + fonts) ───────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" \
            | sudo debconf-set-selections
          sudo apt-get install -y ttf-mscorefonts-installer
          sudo fc-cache -f -v

      # ── 4. Python packages ────────────────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── 5. Restore secrets → .env + token.json + client_secret.json ──────────
      - name: Restore secrets
        env:
          ANTHROPIC_API_KEY:            ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY:           ${{ secrets.ELEVENLABS_API_KEY }}
          PEXELS_API_KEY:               ${{ secrets.PEXELS_API_KEY }}
          TELEGRAM_BOT_TOKEN:           ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:             ${{ secrets.TELEGRAM_CHAT_ID }}
          YOUTUBE_TOKEN_JSON:           ${{ secrets.YOUTUBE_TOKEN_JSON }}
          YOUTUBE_CLIENT_SECRET_JSON:   ${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}
        run: |
          python - <<'PYEOF'
          import os, sys
          for key in ['ANTHROPIC_API_KEY', 'ELEVENLABS_API_KEY', 'PEXELS_API_KEY', 'YOUTUBE_TOKEN_JSON', 'YOUTUBE_CLIENT_SECRET_JSON']:
              if not os.environ.get(key):
                  print(f"ERROR: Secret '{key}' is missing or empty!", flush=True)
                  sys.exit(1)
          def clean(s): return s.strip().lstrip(chr(0xfeff))
          with open('.env', 'w', encoding='utf-8') as f:
              f.write(f"ANTHROPIC_API_KEY={clean(os.environ['ANTHROPIC_API_KEY'])}\n")
              f.write(f"ELEVENLABS_API_KEY={clean(os.environ['ELEVENLABS_API_KEY'])}\n")
              f.write(f"PEXELS_API_KEY={clean(os.environ['PEXELS_API_KEY'])}\n")
              f.write(f"TELEGRAM_BOT_TOKEN={clean(os.environ.get('TELEGRAM_BOT_TOKEN',''))}\n")
              f.write(f"TELEGRAM_CHAT_ID={clean(os.environ.get('TELEGRAM_CHAT_ID',''))}\n")
          # strip BOM if present (PowerShell on Windows adds UTF-8 BOM)
          def strip_bom(s):
              return s.lstrip('﻿')
          token_raw = strip_bom(os.environ['YOUTUBE_TOKEN_JSON'])
          secret_raw = strip_bom(os.environ['YOUTUBE_CLIENT_SECRET_JSON'])
          with open('token.json', 'w', encoding='utf-8') as f:
              f.write(token_raw)
          with open('client_secret.json', 'w', encoding='utf-8') as f:
              f.write(secret_raw)

          # تأكد إن token.json فيه refresh_token (مو مجرد access token)
          import json
          token_data = json.loads(token_raw)
          if not token_data.get('refresh_token'):
              print("ERROR: YOUTUBE_TOKEN_JSON has no refresh_token — re-authorize locally then update the secret!", flush=True)
              sys.exit(1)
          # تأكد إن السكوبات تحتوي youtube.upload على الأقل
          scopes = token_data.get('scopes', [])
          required = 'https://www.googleapis.com/auth/youtube.upload'
          if not any('youtube' in s for s in scopes):
              print(f"WARNING: token scopes={scopes} — may be missing youtube scope. Re-authorize locally!", flush=True)
          print("Secrets restored OK", flush=True)
          PYEOF

      # ── 5b. Patch font paths for Linux (Impact → Liberation Sans Bold) ────────
      - name: Patch font paths for Linux
        run: |
          python - << 'PYEOF'
          import pathlib
          gv = pathlib.Path("generate_video.py").read_text(encoding="utf-8")
          gv = gv.replace(
              'FONT_IMPACT   = "C:/Windows/Fonts/impact.ttf"',
              'FONT_IMPACT   = "/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf"'
          )
          gv = gv.replace(
              'FONT_ARIAL_BD = "C:/Windows/Fonts/arialbd.ttf"',
              'FONT_ARIAL_BD = "/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf"'
          )
          pathlib.Path("generate_video.py").write_text(gv, encoding="utf-8")
          print("Font paths patched for Linux.")
          PYEOF

      # ── 6. Run pipeline ───────────────────────────────────────────────────────
      - name: Run VoidPulse pipeline
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"
        run: |
          ARGS="--smart"
          if [ -n "${{ github.event.inputs.topic }}" ]; then
            ARGS="$ARGS --topic \"${{ github.event.inputs.topic }}\""
          fi
          if [ "${{ github.event.inputs.skip_upload }}" = "true" ]; then
            ARGS="$ARGS --skip-upload"
          fi
          eval python run_pipeline.py $ARGS

      # ── 7. حفظ الـ metadata في الريبو لتجنب تكرار المواضيع ──────────────────
      - name: Commit updated metadata
        if: success()
        run: |
          git config user.name  "VoidPulse Bot"
          git config user.email "voidpulse-bot@users.noreply.github.com"
          git checkout -- generate_video.py
          git add metadata/
          # فقط نعمل commit لو في تغييرات فعلية
          git diff --cached --quiet || git commit -m "chore: update metadata after pipeline run [skip ci]"
          git pull --rebase origin main
          git push

      # ── 8. تحديث YOUTUBE_TOKEN_JSON بالتوكن المحدث بعد الرفع ─────────────────
      - name: Refresh YOUTUBE_TOKEN_JSON secret
        if: success() && env.GH_PAT != ''
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GH_REPO: ${{ github.repository }}
        run: |
          if [ -f token.json ]; then
            gh secret set YOUTUBE_TOKEN_JSON < token.json --repo "$GH_REPO"
            echo "YOUTUBE_TOKEN_JSON secret updated successfully."
          fi

      # ── 9. حفظ الـ video + logs كـ artifact (احتياطي لو الرفع فشل) ──────────
      - name: Upload video + logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: voidpulse-run-${{ github.run_number }}
          path: |
            logs/
            video/exports/*.mp4
            thumbnails/exported/*.jpg
          retention-days: 7
