name: VoidPulse Daily Upload

on:
  schedule:
    - cron: '0 18 * * *'   # 6 PM UTC = 9 PM Iraq (UTC+3)
  workflow_dispatch:         # تشغيل يدوي من GitHub عند الحاجة

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      # ── 1. تحميل الكود ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Python ─────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. System dependencies (ffmpeg + fonts) ───────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" \
            | sudo debconf-set-selections
          sudo apt-get install -y ttf-mscorefonts-installer
          sudo fc-cache -f -v

      # ── 4. Python packages ────────────────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── 5. Restore secrets → .env + token.json + client_secret.json ──────────
      - name: Restore secrets
        run: |
          cat > .env <<'EOF'
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY=${{ secrets.ELEVENLABS_API_KEY }}
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          EOF
          echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > token.json
          echo '${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}' > client_secret.json

      # ── 6. Run pipeline ───────────────────────────────────────────────────────
      - name: Run VoidPulse pipeline
        run: python run_pipeline.py

      # ── 7. حفظ الـ logs كـ artifact ──────────────────────────────────────────
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: voidpulse-log-${{ github.run_number }}
          path: logs/
          retention-days: 30
